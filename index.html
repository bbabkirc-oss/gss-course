<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GSS Course</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #0f172a;
  color: white;
}

/* Sidebar */
.sidebar {
  width: 280px;
  background: #1e293b;
  height: 100vh;
  padding: 20px;
  box-sizing: border-box;
}

.sidebar h2 {
  color: #38bdf8;
  font-size: 18px;
}

.lecture-btn {
  display: block;
  padding: 10px;
  margin: 8px 0;
  background: #334155;
  border-radius: 8px;
  cursor: pointer;
}

.lecture-btn:hover {
  background: #38bdf8;
  color: black;
}

/* Content */
.content {
  flex: 1;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
}

.card h3 {
  color: #38bdf8;
}

.equation {
  background: #0ea5e9;
  padding: 6px;
  border-radius: 6px;
  display: inline-block;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2 id="courseTitle">Loading...</h2>
  <div id="lectureList"></div>
</div>

<!-- Content -->
<div class="content">
  <h1 id="lectureTitle"></h1>
  <div id="lectureContent"></div>
</div>

<script>
let courseData = null;

fetch('data.json')
.then(res => res.json())
.then(data => {
  courseData = data.course;

  document.getElementById("courseTitle").innerText =
    courseData.title;

  let list = document.getElementById("lectureList");

  courseData.lectures.forEach((lec, index) => {

    let btn = document.createElement("div");
    btn.className = "lecture-btn";
    btn.innerText = lec.title;

    btn.onclick = () => loadLecture(index);

    list.appendChild(btn);
  });

  loadLecture(0);
});

function loadLecture(index) {
  let lec = courseData.lectures[index];

  document.getElementById("lectureTitle").innerText =
    lec.title;

  let container = document.getElementById("lectureContent");
  container.innerHTML = "";

  lec.sections.forEach(sec => {

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML += `<h3>${sec.title}</h3>`;

    if(sec.content){
      let ul = document.createElement("ul");
      sec.content.forEach(p => {
        let li = document.createElement("li");
        li.innerText = p;
        ul.appendChild(li);
      });
      div.appendChild(ul);
    }

    if(sec.equation){
      div.innerHTML += `<div class="equation">${sec.equation}</div>`;
    }

    container.appendChild(div);
  });
}
</script>

</body>
</html>
